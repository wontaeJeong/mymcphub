apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: mcp-hub
resources:
  - ../../base
helmGlobals:
  chartHome: ../../../helm
helmCharts:
  - name: mcp-hub
    releaseName: mcp-hub
    namespace: mcp-hub
    valuesFile: values.yaml
    valuesInline:
      image:
        tag: stg
      config:
        appEnv: staging
        publicUrl: https://mcp-hub-stg.example.com
      auth:
        mode: oidc
        oidcIssuerUrl: https://issuer-stg.example.com
        audience: mcp-hub-stg
        trustedHeaderToken:
          secretName: mcp-hub-auth-proxy-stg
          secretKey: token
      web:
        replicas: 2
      api:
        replicas: 2
      gateway:
        replicas: 2
      worker:
        replicas: 1
        jobToken:
          secretName: mcp-hub-worker-job-stg
          secretKey: token
      serviceMonitor:
        enabled: true
      prometheusRule:
        enabled: true
      grafanaDashboards:
        enabled: true
      cli:
        image:
          repository: mcphubctl
      networkPolicy:
        allowExternalEgress: false
      ingress:
        hosts:
          - host: mcp-hub-stg.example.com
            paths:
              - path: /
                pathType: Prefix
                service: web
              - path: /api
                pathType: Prefix
                service: api
              - path: /mcp
                pathType: Prefix
                service: gateway
