apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: mcp-hub
resources:
  - ../../base
helmGlobals:
  chartHome: ../../../helm
helmCharts:
  - name: mcp-hub
    releaseName: mcp-hub
    namespace: mcp-hub
    valuesFile: values.yaml
    valuesInline:
      image:
        tag: dev
      config:
        nodeEnv: development
        appEnv: development
        logLevel: debug
        publicUrl: https://mcp-hub-dev.example.com
      auth:
        mode: mock
        oidcIssuerUrl: https://issuer-dev.example.com
        audience: mcp-hub-dev
        trustedHeaderToken:
          secretName: ""
      web:
        replicas: 1
      api:
        replicas: 1
      gateway:
        replicas: 1
      worker:
        replicas: 1
        jobToken:
          secretName: ""
      cli:
        image:
          repository: mcphubctl
      ingress:
        hosts:
          - host: mcp-hub-dev.example.com
            paths:
              - path: /
                pathType: Prefix
                service: web
              - path: /api
                pathType: Prefix
                service: api
              - path: /mcp
                pathType: Prefix
                service: gateway
