apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: mcp-hub
resources:
  - ../../base
helmGlobals:
  chartHome: ../../../helm
helmCharts:
  - name: mcp-hub
    releaseName: mcp-hub
    namespace: mcp-hub
    valuesFile: values.yaml
    valuesInline:
      image:
        tag: prod
      config:
        appEnv: production
        publicUrl: https://mcp-hub.example.com
      auth:
        mode: oidc
        oidcIssuerUrl: https://issuer.example.com
        audience: mcp-hub
        trustedHeaderToken:
          secretName: mcp-hub-auth-proxy
          secretKey: token
      web:
        replicas: 3
      api:
        replicas: 3
      gateway:
        replicas: 3
      worker:
        replicas: 1
        jobToken:
          secretName: mcp-hub-worker-job
          secretKey: token
      cli:
        image:
          repository: mcphubctl
      networkPolicy:
        allowExternalEgress: false
      ingress:
        hosts:
          - host: mcp-hub.example.com
            paths:
              - path: /
                pathType: Prefix
                service: web
              - path: /api
                pathType: Prefix
                service: api
              - path: /mcp
                pathType: Prefix
                service: gateway
