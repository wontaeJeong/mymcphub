{{- if .Values.gateway.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mcp-hub.componentName" (dict "root" . "component" "gateway") }}
  labels:
{{ include "mcp-hub.componentLabels" (dict "root" . "component" "gateway") | indent 4 }}
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
{{ include "mcp-hub.componentSelectorLabels" (dict "root" . "component" "gateway") | indent 6 }}
  template:
    metadata:
      labels:
{{ include "mcp-hub.componentSelectorLabels" (dict "root" . "component" "gateway") | indent 8 }}
    spec:
      serviceAccountName: {{ include "mcp-hub.serviceAccountName" (dict "root" . "component" "gateway" "componentValues" .Values.gateway) }}
      securityContext:
{{ include "mcp-hub.podSecurityContext" . | indent 8 }}
      containers:
        - name: gateway
          image: {{ include "mcp-hub.image" (dict "root" . "componentValues" .Values.gateway) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.gateway.port }}
          env:
            - name: PORT
              value: {{ .Values.gateway.port | quote }}
{{ include "mcp-hub.secretEnv" . | indent 12 }}
          envFrom:
{{ include "mcp-hub.commonEnvFrom" . | indent 12 }}
          {{- if .Values.gateway.probes.enabled }}
          readinessProbe:
{{- if eq .Values.gateway.probes.type "httpGet" }}
{{ include "mcp-hub.httpProbe" .Values.gateway.probes.readiness | indent 12 }}
{{- else }}
{{ include "mcp-hub.tcpProbe" .Values.gateway.probes.readiness | indent 12 }}
{{- end }}
          livenessProbe:
{{- if eq .Values.gateway.probes.type "httpGet" }}
{{ include "mcp-hub.httpProbe" .Values.gateway.probes.liveness | indent 12 }}
{{- else }}
{{ include "mcp-hub.tcpProbe" .Values.gateway.probes.liveness | indent 12 }}
{{- end }}
          {{- end }}
          resources:
{{ toYaml .Values.gateway.resources | indent 12 }}
          securityContext:
{{ include "mcp-hub.containerSecurityContext" . | indent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
