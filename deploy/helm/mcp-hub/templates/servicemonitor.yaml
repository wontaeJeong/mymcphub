{{- if .Values.serviceMonitor.enabled }}
{{- $root := . }}
{{- range $component, $componentValues := dict "api" .Values.api "gateway" .Values.gateway "worker" .Values.worker }}
{{- if and $componentValues.enabled (or (ne $component "worker") $componentValues.service.enabled) }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "mcp-hub.componentName" (dict "root" $root "component" $component) }}
  {{- if $root.Values.serviceMonitor.namespace }}
  namespace: {{ $root.Values.serviceMonitor.namespace }}
  {{- end }}
  labels:
{{ include "mcp-hub.componentLabels" (dict "root" $root "component" $component) | indent 4 }}
spec:
  selector:
    matchLabels:
{{ include "mcp-hub.componentSelectorLabels" (dict "root" $root "component" $component) | indent 6 }}
  endpoints:
    - port: http
      path: /metrics
      interval: {{ $root.Values.serviceMonitor.interval }}
      scrapeTimeout: {{ $root.Values.serviceMonitor.scrapeTimeout }}
{{- end }}
{{- end }}
{{- end }}
