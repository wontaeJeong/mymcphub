{{- if and (not .Values.postgres.external.enabled) .Values.postgres.placeholder.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mcp-hub.fullname" . }}-postgres
  labels:
{{ include "mcp-hub.labels" . | indent 4 }}
    app.kubernetes.io/component: postgres-placeholder
  annotations:
    mcp-hub.example.com/description: "Placeholder only; provide an actual PostgreSQL backend and DATABASE_URL Secret."
spec:
  clusterIP: None
  ports:
    - name: postgres
      port: {{ .Values.postgres.placeholder.port }}
      targetPort: postgres
{{- end }}
