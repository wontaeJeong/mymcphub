{{- if .Values.web.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mcp-hub.componentName" (dict "root" . "component" "web") }}
  labels:
{{ include "mcp-hub.componentLabels" (dict "root" . "component" "web") | indent 4 }}
spec:
  type: {{ .Values.web.service.type }}
  selector:
{{ include "mcp-hub.componentSelectorLabels" (dict "root" . "component" "web") | indent 4 }}
  ports:
    - name: http
      port: {{ .Values.web.service.port }}
      targetPort: http
{{- end }}
