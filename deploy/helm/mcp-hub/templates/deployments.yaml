{{- range $component, $port := dict "api" .Values.api.port "worker" .Values.worker.port "web" .Values.web.port }}
{{- $values := index $.Values $component }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mcp-hub.fullname" $ }}-{{ $component }}
  labels:
    {{- include "mcp-hub.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
spec:
  replicas: {{ $values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ $.Release.Name }}
      app.kubernetes.io/component: {{ $component }}
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ $.Release.Name }}
        app.kubernetes.io/component: {{ $component }}
    spec:
      serviceAccountName: {{ include "mcp-hub.fullname" $ }}
      securityContext:
        {{- toYaml $.Values.securityContext | nindent 8 }}
      containers:
        - name: {{ $component }}
          image: {{ include "mcp-hub.image" (list $ $component) }}
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          ports:
            - containerPort: {{ $port }}
          envFrom:
            - configMapRef:
                name: {{ include "mcp-hub.fullname" $ }}-config
          env:
            - name: PORT
              value: {{ $port | quote }}
            - name: DATABASE_URL
              valueFrom: { secretKeyRef: { name: {{ $.Values.postgres.databaseUrlSecretName | quote }}, key: {{ $.Values.postgres.databaseUrlSecretKey | quote }} } }
            - name: MCPHUB_ADMIN_TOKEN
              valueFrom: { secretKeyRef: { name: {{ $.Values.auth.adminTokenSecretName | quote }}, key: {{ $.Values.auth.adminTokenSecretKey | quote }} } }
            - name: MCPHUB_READ_TOKEN
              valueFrom: { secretKeyRef: { name: {{ $.Values.auth.readTokenSecretName | quote }}, key: {{ $.Values.auth.readTokenSecretKey | quote }} } }
          readinessProbe: { httpGet: { path: {{ ternary "/" "/readyz" (eq $component "web") | quote }}, port: {{ $port }} }, initialDelaySeconds: 10, periodSeconds: 10 }
          livenessProbe: { httpGet: { path: {{ ternary "/" "/healthz" (eq $component "web") | quote }}, port: {{ $port }} }, initialDelaySeconds: 30, periodSeconds: 20 }
          securityContext:
            {{- toYaml $.Values.containerSecurityContext | nindent 12 }}
          resources:
            {{- toYaml $values.resources | nindent 12 }}
---
{{- end }}
