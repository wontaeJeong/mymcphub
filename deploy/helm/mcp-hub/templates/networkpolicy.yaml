{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "mcp-hub.fullname" . }}
  labels:
{{ include "mcp-hub.labels" . | indent 4 }}
spec:
  podSelector:
    matchLabels:
{{ include "mcp-hub.selectorLabels" . | indent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
{{ include "mcp-hub.selectorLabels" . | indent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.web.port }}
        - protocol: TCP
          port: {{ .Values.api.port }}
        - protocol: TCP
          port: {{ .Values.gateway.port }}
        - protocol: TCP
          port: {{ .Values.worker.port }}
    - from:
        - namespaceSelector:
{{ toYaml .Values.networkPolicy.ingressNamespaceSelector | indent 12 }}
      ports:
        - protocol: TCP
          port: {{ .Values.web.port }}
        - protocol: TCP
          port: {{ .Values.api.port }}
        - protocol: TCP
          port: {{ .Values.gateway.port }}
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- if .Values.networkPolicy.allowExternalEgress }}
    - {}
    {{- end }}
{{- end }}
