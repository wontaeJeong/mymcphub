{{- if .Values.api.enabled }}
{{- if and .Values.corporateCa.enabled (not .Values.corporateCa.secretName) }}
{{- fail "corporateCa.secretName is required when corporateCa.enabled=true" }}
{{- end }}
{{- if and (eq .Values.auth.mode "oidc") (or (not .Values.auth.trustedHeaderToken.secretName) (not .Values.auth.trustedHeaderToken.secretKey)) }}
{{- fail "auth.trustedHeaderToken.secretName and auth.trustedHeaderToken.secretKey are required when auth.mode=oidc" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mcp-hub.componentName" (dict "root" . "component" "api") }}
  labels:
{{ include "mcp-hub.componentLabels" (dict "root" . "component" "api") | indent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
{{ include "mcp-hub.componentSelectorLabels" (dict "root" . "component" "api") | indent 6 }}
  template:
    metadata:
      labels:
{{ include "mcp-hub.componentSelectorLabels" (dict "root" . "component" "api") | indent 8 }}
    spec:
      serviceAccountName: {{ include "mcp-hub.serviceAccountName" (dict "root" . "component" "api" "componentValues" .Values.api) }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      securityContext:
{{ include "mcp-hub.podSecurityContext" . | indent 8 }}
      containers:
        - name: api
          image: {{ include "mcp-hub.image" (dict "root" . "componentValues" .Values.api) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
          env:
            - name: PORT
              value: {{ .Values.api.port | quote }}
{{- if .Values.auth.trustedHeaderToken.secretName }}
            - name: MCP_TRUSTED_AUTH_HEADER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.trustedHeaderToken.secretName }}
                  key: {{ .Values.auth.trustedHeaderToken.secretKey }}
{{- end }}
{{ include "mcp-hub.secretEnv" . | indent 12 }}
{{ include "mcp-hub.corporateCaEnv" . | indent 12 }}
          envFrom:
{{ include "mcp-hub.commonEnvFrom" . | indent 12 }}
          {{- if .Values.api.probes.enabled }}
          readinessProbe:
{{ include "mcp-hub.httpProbe" .Values.api.probes.readiness | indent 12 }}
          livenessProbe:
{{ include "mcp-hub.httpProbe" .Values.api.probes.liveness | indent 12 }}
          {{- end }}
          resources:
{{ toYaml .Values.api.resources | indent 12 }}
          securityContext:
{{ include "mcp-hub.containerSecurityContext" . | indent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
{{ include "mcp-hub.corporateCaVolumeMount" . | indent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
{{ include "mcp-hub.corporateCaVolume" . | indent 8 }}
{{- end }}
