{{- if .Values.worker.enabled }}
{{- if and (eq .Values.auth.mode "oidc") (or (not .Values.worker.jobToken.secretName) (not .Values.worker.jobToken.secretKey)) }}
{{- fail "worker.jobToken.secretName and worker.jobToken.secretKey are required when auth.mode=oidc" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mcp-hub.componentName" (dict "root" . "component" "worker") }}
  labels:
{{ include "mcp-hub.componentLabels" (dict "root" . "component" "worker") | indent 4 }}
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
{{ include "mcp-hub.componentSelectorLabels" (dict "root" . "component" "worker") | indent 6 }}
  template:
    metadata:
      labels:
{{ include "mcp-hub.componentSelectorLabels" (dict "root" . "component" "worker") | indent 8 }}
    spec:
      serviceAccountName: {{ include "mcp-hub.serviceAccountName" (dict "root" . "component" "worker" "componentValues" .Values.worker) }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      securityContext:
{{ include "mcp-hub.podSecurityContext" . | indent 8 }}
      containers:
        - name: worker
          image: {{ include "mcp-hub.image" (dict "root" . "componentValues" .Values.worker) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.worker.port }}
          env:
            - name: PORT
              value: {{ .Values.worker.port | quote }}
            - name: MCP_RUNTIME_RECONCILE_INTERVAL
              value: {{ .Values.managedRuntime.controller.reconcileInterval | quote }}
{{- if .Values.worker.jobToken.secretName }}
            - name: MCP_WORKER_JOB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.worker.jobToken.secretName }}
                  key: {{ .Values.worker.jobToken.secretKey }}
{{- end }}
{{ include "mcp-hub.secretEnv" . | indent 12 }}
          envFrom:
{{ include "mcp-hub.commonEnvFrom" . | indent 12 }}
          {{- if .Values.worker.probes.enabled }}
          readinessProbe:
{{ include "mcp-hub.httpProbe" .Values.worker.probes.readiness | indent 12 }}
          livenessProbe:
{{ include "mcp-hub.httpProbe" .Values.worker.probes.liveness | indent 12 }}
          {{- end }}
          resources:
{{ toYaml .Values.worker.resources | indent 12 }}
          securityContext:
{{ include "mcp-hub.containerSecurityContext" . | indent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
