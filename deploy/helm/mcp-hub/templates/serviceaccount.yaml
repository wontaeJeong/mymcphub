{{- if .Values.serviceAccount.create }}
{{- $root := . -}}
{{- range $component, $componentValues := dict "web" .Values.web "api" .Values.api "gateway" .Values.gateway "worker" .Values.worker }}
{{- if $componentValues.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "mcp-hub.serviceAccountName" (dict "root" $root "component" $component "componentValues" $componentValues) }}
  labels:
{{ include "mcp-hub.componentLabels" (dict "root" $root "component" $component) | indent 4 }}
  {{- with $root.Values.serviceAccount.annotations }}
  annotations:
{{ toYaml . | indent 4 }}
  {{- end }}
automountServiceAccountToken: {{ $root.Values.serviceAccount.automountServiceAccountToken }}
{{- end }}
{{- end }}
{{- end }}
