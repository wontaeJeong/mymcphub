{{- if and .Values.worker.enabled .Values.worker.service.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mcp-hub.componentName" (dict "root" . "component" "worker") }}
  labels:
{{ include "mcp-hub.componentLabels" (dict "root" . "component" "worker") | indent 4 }}
spec:
  type: {{ .Values.worker.service.type }}
  selector:
{{ include "mcp-hub.componentSelectorLabels" (dict "root" . "component" "worker") | indent 4 }}
  ports:
    - name: http
      port: {{ .Values.worker.service.port }}
      targetPort: http
{{- end }}
