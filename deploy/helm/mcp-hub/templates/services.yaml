{{- range $component, $port := dict "api" .Values.api.port "worker" .Values.worker.port "web" .Values.web.port }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mcp-hub.fullname" $ }}-{{ $component }}
  labels:
    {{- include "mcp-hub.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
spec:
  type: ClusterIP
  ports:
    - port: {{ $port }}
      targetPort: {{ $port }}
  selector:
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/component: {{ $component }}
---
{{- end }}
