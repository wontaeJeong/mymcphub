apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mcp-hub.fullname" . }}-config
  labels:
{{ include "mcp-hub.labels" . | indent 4 }}
data:
  NODE_ENV: {{ .Values.config.nodeEnv | quote }}
  APP_ENV: {{ .Values.config.appEnv | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  MCP_AUTH_MODE: {{ .Values.auth.mode | quote }}
  OIDC_ISSUER_URL: {{ .Values.auth.oidcIssuerUrl | quote }}
  OIDC_AUDIENCE: {{ .Values.auth.audience | quote }}
  OIDC_CLIENT_ID: {{ .Values.config.oidcClientId | quote }}
  MCP_TRUSTED_PROXY_HEADER: {{ .Values.auth.trustedProxy.headerName | quote }}
  MCP_HUB_PUBLIC_URL: {{ .Values.config.publicUrl | quote }}
  MCP_API_URL: {{ .Values.config.apiUrl | quote }}
  NEXT_PUBLIC_MCP_API_URL: {{ .Values.config.apiUrl | quote }}
  MCP_GATEWAY_URL: {{ .Values.config.gatewayUrl | quote }}
  MCP_WEB_AUTH_ENABLED_PROVIDERS: {{ .Values.webAuth.enabledProviders | quote }}
  MCP_WEB_SESSION_COOKIE_NAME: {{ .Values.webAuth.sessionCookieName | quote }}
  MCP_WEB_SESSION_TTL_SECONDS: {{ .Values.webAuth.sessionTtlSeconds | quote }}
  MCP_WEB_LOCAL_AUTH_ENABLED: {{ .Values.webAuth.localAuthEnabled | quote }}
  MCP_WEB_DEV_AUTH_ENABLED: {{ .Values.webAuth.devAuthEnabled | quote }}
  MCP_WEB_OIDC_PROVIDERS: {{ .Values.webAuth.oidcProviders | quote }}
  MCP_STORE_PATH: {{ .Values.config.storePath | quote }}
  MCP_RUNTIME_NAMESPACE: {{ .Values.managedRuntime.namespace | quote }}
  MCP_RUNTIME_CONTROLLER_MODE: {{ .Values.managedRuntime.controller.mode | quote }}
  MCP_SECRET_LEASE_SECONDS: {{ .Values.managedRuntime.defaults.secretLeaseSeconds | quote }}
  MCP_WORKER_INTERVAL_SECONDS: {{ .Values.config.workerIntervalSeconds | quote }}
