{{- if and .Values.worker.enabled .Values.managedRuntime.controller.rbac.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "mcp-hub.componentName" (dict "root" . "component" "runtime-controller") }}
  labels:
{{ include "mcp-hub.componentLabels" (dict "root" . "component" "runtime-controller") | indent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies", "ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "mcp-hub.componentName" (dict "root" . "component" "runtime-controller") }}
  labels:
{{ include "mcp-hub.componentLabels" (dict "root" . "component" "runtime-controller") | indent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "mcp-hub.serviceAccountName" (dict "root" . "component" "worker" "componentValues" .Values.worker) }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "mcp-hub.componentName" (dict "root" . "component" "runtime-controller") }}
{{- end }}
