image:
  registry: registry.example.com
  repositoryPrefix: mcp-hub
  tag: prod
  pullPolicy: IfNotPresent

config:
  nodeEnv: production
  logLevel: info
  publicUrl: https://mcp-hub.example.com
  apiUrl: http://mcp-hub-api:4000
  gatewayUrl: http://mcp-hub-gateway:5000

auth:
  mode: oidc
  oidcIssuerUrl: https://issuer.example.com
  audience: mcp-hub

web:
  replicas: 3

api:
  replicas: 3

gateway:
  replicas: 3

worker:
  replicas: 1

ingress:
  hosts:
    - host: mcp-hub.example.com
      paths:
        - path: /
          pathType: Prefix
          service: web
        - path: /api
          pathType: Prefix
          service: api
        - path: /mcp
          pathType: Prefix
          service: gateway
