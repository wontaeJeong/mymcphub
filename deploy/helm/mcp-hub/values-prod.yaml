image:
  registry: registry.example.com
  repositoryPrefix: mcp-hub
  tag: prod
  pullPolicy: IfNotPresent

config:
  nodeEnv: production
  logLevel: info
  publicUrl: https://mcp-hub.example.com
  apiUrl: http://mcp-hub-api:4000
  gatewayUrl: http://mcp-hub-gateway:5000

auth:
  mode: oidc
  oidcIssuerUrl: https://issuer.example.com
  audience: mcp-hub
  trustedHeaderToken:
    secretName: mcp-hub-auth-proxy
    secretKey: token

web:
  replicas: 3

api:
  replicas: 3

gateway:
  replicas: 3

worker:
  replicas: 1
  jobToken:
    secretName: mcp-hub-worker-job
    secretKey: token

serviceMonitor:
  enabled: true

prometheusRule:
  enabled: true
  thresholds:
    gatewayErrorRate: 0.03
    authFailures: 20
    upstreamFailures: 5
    workerLagSeconds: 300

grafanaDashboards:
  enabled: true

ingress:
  hosts:
    - host: mcp-hub.example.com
      paths:
        - path: /
          pathType: Prefix
          service: web
        - path: /api
          pathType: Prefix
          service: api
        - path: /mcp
          pathType: Prefix
          service: gateway

networkPolicy:
  allowExternalEgress: false
