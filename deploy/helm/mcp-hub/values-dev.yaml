image:
  registry: registry.example.com
  repositoryPrefix: mcp-hub
  tag: dev
  pullPolicy: IfNotPresent

config:
  nodeEnv: development
  logLevel: debug
  publicUrl: https://mcp-hub-dev.example.com
  apiUrl: http://mcp-hub-api:4000
  gatewayUrl: http://mcp-hub-gateway:5000

auth:
  mode: mock
  oidcIssuerUrl: https://issuer-dev.example.com
  audience: mcp-hub-dev

web:
  replicas: 1

api:
  replicas: 1

gateway:
  replicas: 1

worker:
  replicas: 1

ingress:
  hosts:
    - host: mcp-hub-dev.example.com
      paths:
        - path: /
          pathType: Prefix
          service: web
        - path: /api
          pathType: Prefix
          service: api
        - path: /mcp
          pathType: Prefix
          service: gateway
