image:
  registry: registry.corp.internal
  repositoryPrefix: mcp-hub
  tag: latest
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  automountServiceAccountToken: false
  annotations: {}

securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]
  seccompProfile:
    type: RuntimeDefault

config:
  authMode: oidc
  apiUrl: http://mcp-hub-api:4000
  publicUrl: https://mcp-hub.corp.internal
  workerInterval: 60s
  syncTimeout: 20s
  enableServerStdioExec: "false"

auth:
  adminTokenSecretName: mcp-hub-admin
  adminTokenSecretKey: adminToken
  readTokenSecretName: mcp-hub-read
  readTokenSecretKey: readToken

postgres:
  databaseUrlSecretName: mcp-hub-db
  databaseUrlSecretKey: databaseUrl

web:
  replicas: 2
  port: 3000
  image: { repository: web, digest: "" }
  resources: { requests: { cpu: 100m, memory: 256Mi }, limits: { cpu: 500m, memory: 512Mi } }
api:
  replicas: 2
  port: 4000
  image: { repository: api, digest: "" }
  resources: { requests: { cpu: 100m, memory: 256Mi }, limits: { cpu: 500m, memory: 512Mi } }
worker:
  replicas: 1
  port: 4100
  image: { repository: worker, digest: "" }
  resources: { requests: { cpu: 100m, memory: 256Mi }, limits: { cpu: 500m, memory: 512Mi } }

ingress:
  enabled: true
  className: nginx
  annotations: {}
  host: mcp-hub.corp.internal
  tls: []

networkPolicy:
  enabled: true
  allowExternalEgress: true

hpa:
  enabled: false
pdb:
  enabled: false
