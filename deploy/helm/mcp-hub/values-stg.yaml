image:
  registry: registry.example.com
  repositoryPrefix: mcp-hub
  tag: stg
  pullPolicy: IfNotPresent

config:
  nodeEnv: production
  logLevel: info
  publicUrl: https://mcp-hub-stg.example.com
  apiUrl: http://mcp-hub-api:4000
  gatewayUrl: http://mcp-hub-gateway:5000

auth:
  mode: oidc
  oidcIssuerUrl: https://issuer-stg.example.com
  audience: mcp-hub-stg
  trustedHeaderToken:
    secretName: mcp-hub-auth-proxy-stg
    secretKey: token

web:
  replicas: 2

api:
  replicas: 2

gateway:
  replicas: 2

worker:
  replicas: 1
  jobToken:
    secretName: mcp-hub-worker-job-stg
    secretKey: token

ingress:
  hosts:
    - host: mcp-hub-stg.example.com
      paths:
        - path: /
          pathType: Prefix
          service: web
        - path: /api
          pathType: Prefix
          service: api
        - path: /mcp
          pathType: Prefix
          service: gateway

networkPolicy:
  allowExternalEgress: false
