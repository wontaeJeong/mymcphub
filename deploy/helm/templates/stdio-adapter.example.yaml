# Prompt-07 scoped example. The full chart is intentionally deferred to prompt-10.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stdio-sample-adapter
  labels:
    app.kubernetes.io/name: stdio-sample-adapter
    app.kubernetes.io/component: stdio-adapter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: stdio-sample-adapter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: stdio-sample-adapter
        app.kubernetes.io/component: stdio-adapter
    spec:
      containers:
        - name: adapter
          image: mcp-hub/stdio-adapter:prompt-07
          ports:
            - name: http
              containerPort: 5103
          env:
            - name: PORT
              value: "5103"
            - name: STDIO_MCP_COMMAND
              value: node
            - name: STDIO_MCP_ARGS
              value: servers/stdio-sample/dist/index.js
            - name: STDIO_WORKDIR
              value: /app
            - name: STDIO_STARTUP_TIMEOUT_MS
              value: "10000"
            - name: STDIO_REQUEST_TIMEOUT_MS
              value: "30000"
            - name: STDIO_MAX_BODY_BYTES
              value: "1048576"
            - name: STDIO_MAX_QUEUE_DEPTH
              value: "16"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 10001
---
apiVersion: v1
kind: Service
metadata:
  name: stdio-sample-adapter
  labels:
    app.kubernetes.io/name: stdio-sample-adapter
spec:
  selector:
    app.kubernetes.io/name: stdio-sample-adapter
  ports:
    - name: http
      port: 5103
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: stdio-sample-adapter
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: stdio-sample-adapter
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mcp-gateway
      ports:
        - protocol: TCP
          port: 5103
  egress: []
