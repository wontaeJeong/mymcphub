name: mcp-hub-local
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mcp_hub
      POSTGRES_USER: mcp
      POSTGRES_PASSWORD: mcp
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp -d mcp_hub"]
      interval: 5s
      timeout: 5s
      retries: 20
volumes:
  postgres-data:
