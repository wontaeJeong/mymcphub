name: mcp-hub-local

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mcp_hub
      POSTGRES_USER: mcp
      POSTGRES_PASSWORD: mcp
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp -d mcp_hub"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: ["start-dev", "--import-realm", "--http-port=8080"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./scripts/dev/keycloak-realm.json:/opt/keycloak/data/import/mcp-hub-realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.103.0
    profiles: ["otel"]
    command: ["--config=/etc/otelcol/config.yaml"]
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    volumes:
      - ./scripts/dev/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro

volumes:
  postgres-data:
  redis-data:
